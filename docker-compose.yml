version: '3.8'

services:
  laravel:
    build:
      context: .
    container_name: laravel_app
    ports:
      - "8000:80"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=crud_app
      - DB_USERNAME=root
      - DB_PASSWORD=root

  react:
    build:
      context: ./react
    container_name: react_app
    ports:
      - "3000:3000"
    depends_on:
      - laravel

  mysql:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: crud_app
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data: